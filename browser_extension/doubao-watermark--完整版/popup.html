<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>comfyui豆包无水印下载</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <div class="header">
      <img src="icon.png" class="logo" alt="logo" />
      <div class="header-info">
        <h1 class="title">comfyui豆包无水印下载</h1>
        <p class="subtitle">AI 图片/视频无水印下载工具</p>
      </div>
    </div>

    <!-- 主界面 -->
    <div id="main" class="section">
      <div class="info-box">
        <p class="info-text">点击左上"📥原图“即可下载无水印资源。</p>
      </div>

      <div class="stats">
        <div class="stat-item">
          <span class="stat-value" id="imageCount">0</span>
          <span class="stat-label">已捕获图片</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-value" id="videoCount">0</span>
          <span class="stat-label">已捕获视频</span>
        </div>
      </div>
      
      <!-- 版本即将过期提示 -->
      <div id="versionWarning" class="warning-box hidden">
        <p class="warning-text" id="warningText"></p>
        <button class="btn btn-update-action" id="updateActionBtn">前往更新</button>
      </div>
    </div>

    <!-- 版本失效界面 -->
    <div id="expired" class="section hidden">
      <div class="status-badge inactive">
        <span class="dot"></span>
        版本已失效
      </div>
      <div class="info-box">
        <p class="info-text" id="expiredMessage">当前版本已过期，请更新到最新版本。</p>
      </div>
      <div class="version-info-box" id="versionInfoBox">
        <p class="version-info-text">最新版本: <span id="newVersion">-</span></p>
        <p class="version-info-text" id="expireDate"></p>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="updateBtn">立即更新</button>
      </div>
    </div>

    <div class="footer">
      <p class="version-text">版本 <span id="versionText">1.0</span></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
